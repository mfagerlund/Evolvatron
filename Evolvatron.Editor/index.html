<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolvatron - Reward Landscape Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #e0e0f0;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }

    #toolbar button {
      padding: 2px 8px;
      background: #2a2a4a;
      color: #c0c0e0;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      line-height: 24px;
      min-width: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    #toolbar button:hover { background: #3a3a5a; }
    #toolbar button.active { background: #4466aa; border-color: #6688cc; color: #fff; }

    #toolbar button { position: relative; }
    #toolbar button::after {
      content: attr(data-tooltip);
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 6px;
      padding: 3px 8px;
      background: #111;
      color: #ccc;
      font-size: 11px;
      font-family: monospace;
      white-space: nowrap;
      border-radius: 3px;
      border: 1px solid #333;
      pointer-events: none;
      opacity: 0;
      z-index: 100;
    }
    #toolbar button:hover::after {
      opacity: 1;
    }

    #toolbar .tool-obstacle { color: #ff6644; }
    #toolbar .tool-checkpoint { color: #ffcc00; }
    #toolbar .tool-speed { color: #00ccff; }
    #toolbar .tool-danger { color: #ff3366; }
    #toolbar .tool-attractor { color: #44ffaa; }
    #toolbar .tool-reward { color: #88ddbb; }
    #toolbar .tool-obstacle.active,
    #toolbar .tool-checkpoint.active,
    #toolbar .tool-speed.active,
    #toolbar .tool-danger.active,
    #toolbar .tool-attractor.active,
    #toolbar .tool-reward.active { color: #fff; }

    .separator {
      width: 1px;
      height: 24px;
      background: #3a3a5a;
      margin: 0 6px;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #canvas-container {
      flex: 1;
      position: relative;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #properties-panel {
      width: 260px;
      background: #16162a;
      border-left: 1px solid #2a2a4a;
      padding: 12px;
      overflow-y: auto;
      flex-shrink: 0;
      font-size: 12px;
    }

    #properties-panel h3 {
      font-size: 13px;
      color: #8888bb;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .prop-row {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }
    .prop-row label {
      width: 100px;
      color: #9999bb;
      font-size: 11px;
      flex-shrink: 0;
    }
    .prop-row input, .prop-row select {
      flex: 1;
      padding: 3px 6px;
      background: #1a1a30;
      border: 1px solid #3a3a5a;
      border-radius: 3px;
      color: #e0e0f0;
      font-size: 11px;
      font-family: monospace;
    }
    .prop-row input[type="checkbox"] {
      flex: none;
      width: 14px;
      height: 14px;
    }

    #no-selection {
      color: #666688;
      font-style: italic;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-select" class="active" data-tooltip="Select tool (V)">⬚</button>
    <div class="separator"></div>
    <button id="btn-obstacle" class="tool-obstacle" data-tooltip="Obstacle (1)">▭</button>
    <button id="btn-checkpoint" class="tool-checkpoint" data-tooltip="Checkpoint (2)">◯</button>
    <button id="btn-speed-zone" class="tool-speed" data-tooltip="Speed Zone (3)">◈</button>
    <button id="btn-danger-zone" class="tool-danger" data-tooltip="Danger Zone (4)">⚠</button>
    <button id="btn-attractor" class="tool-attractor" data-tooltip="Attractor (5)">◎</button>
    <div class="separator"></div>
    <button id="btn-reward-overlay" class="tool-reward" data-tooltip="Toggle reward overlay (R)">♨</button>
    <div class="separator"></div>
    <button id="btn-new" data-tooltip="New world">✦</button>
    <button id="btn-load" data-tooltip="Load .evo.json">📂</button>
    <button id="btn-save" data-tooltip="Save .evo.json">💾</button>
    <button id="btn-export" data-tooltip="Export .sim.json for C#">⤓</button>
  </div>

  <div id="main">
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
    </div>
    <div id="properties-panel">
      <div id="no-selection">Select an object to edit properties</div>
      <div id="props-content" style="display:none"></div>
    </div>
  </div>

  <input type="file" id="file-input" accept=".evo.json" style="display:none" />
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
